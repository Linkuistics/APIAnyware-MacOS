# LLM annotation provider configuration.
#
# Copy this file to config.toml and fill in your API key.
# The annotation script reads this config to call the LLM provider.

[provider]
# Base URL for OpenAI-compatible API endpoint.
# Examples:
#   Anthropic:     "https://api.anthropic.com/v1"
#   OpenAI:        "https://api.openai.com/v1"
#   Ollama:        "http://localhost:11434/v1"
#   vLLM:          "http://localhost:8000/v1"
base_url = "https://api.anthropic.com/v1"

# Model identifier.
# Examples:
#   Anthropic:     "claude-sonnet-4-6-20250514"
#   OpenAI:        "gpt-4o"
#   Ollama:        "llama3:70b"
model = "claude-sonnet-4-6-20250514"

# Environment variable containing the API key.
# The script reads the key from this env var (never hardcoded).
api_key_env = "ANTHROPIC_API_KEY"

[paths]
# Directory containing resolved IR checkpoints (input).
resolved_dir = "analysis/ir/resolved"

# Directory for annotated checkpoints (output).
annotated_dir = "analysis/ir/annotated"

# Prompt template file.
prompt_template = "analysis/scripts/prompt-template.md"

[options]
# Maximum methods to send per LLM request (to fit context windows).
batch_size = 100

# Only annotate methods matching these criteria (reduces cost).
# Set to false to annotate all methods.
filter_interesting_only = true

# Temperature for LLM generation (lower = more deterministic).
temperature = 0.0
